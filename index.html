<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Study Planner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="planner-card">
      <h1>📚 Smart Study Planner</h1>
      <p class="subtitle">
        Plan your study tasks based on priority, duration, and focus level.
      </p>

      <div class="form-group">
        <label for="taskName">Study Task</label>
        <input type="text" id="taskName" placeholder="Example: Revise JavaScript basics" />
      </div>

      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority">
          <option value="High">High Priority</option>
          <option value="Medium">Medium Priority</option>
          <option value="Low">Low Priority</option>
        </select>
      </div>

      <div class="form-group">
        <label for="duration">Study Duration</label>
        <select id="duration">
          <option value="25">25 minutes</option>
          <option value="45">45 minutes</option>
          <option value="60">1 hour</option>
          <option value="90">1 hour 30 minutes</option>
        </select>
      </div>

      <button onclick="generatePlan()">Generate Study Plan</button>

      <div id="result" class="result hidden"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
